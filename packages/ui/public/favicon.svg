<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="wand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 指揮棒（斜め） -->
  <rect x="11" y="30" width="42" height="5" rx="2.5"
        fill="url(#wand)"
        transform="rotate(-38 32 32)"/>

  <!-- 先端の球 -->
  <circle cx="47" cy="15" r="5" fill="#ffffff" opacity="0.95"/>

  <!-- AIを示す3本の音波ライン -->
  <line x1="8" y1="44" x2="8" y2="56" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="40" x2="16" y2="56" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="24" y1="36" x2="24" y2="56" stroke="white" stroke-width="3" stroke-linecap="round" opacity="1"/>
</svg>
